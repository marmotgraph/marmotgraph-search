name: Publish Maven Packages

on:
  push:
    branches:
       - search_as_a_library
    tags: [ 'v*' ]          # also publish on version tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # required to push to GitHub Packages
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json 
          
      - name: Install UI dependencies
        working-directory: ui                            
        run: npm ci
        
      - name: Build UI
        working-directory: ui                            
        run: npm run build        
        
      - name: Copy UI build into service resources
        run:  cp -r ui/dist/* service/search/src/main/resources/public/
        
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-packages
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: service
        run: mvn --batch-mode versions:set -DnewVersion=${GITHUB_REF_NAME#v}

      - name: Publish to GitHub Packages
        working-directory: service
        run: mvn --batch-mode deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
